name: release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-freebsd
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: contains(matrix.target, 'linux-musl') || contains(matrix.target, 'freebsd')
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: contains(matrix.target, 'linux-musl') || contains(matrix.target, 'freebsd')
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: contains(matrix.target, 'apple-darwin')
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          bin=target/${{ matrix.target }}/release/inf
          archive=inf-${{ matrix.target }}.tar.gz
          tar czf "$archive" -C target/${{ matrix.target }}/release inf
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: inf-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true

  publish-crate:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
